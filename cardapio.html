<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cardápio — FitPoint Fitness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="/assets/logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fp: {
              green: '#1D6B3A',
              green2: '#2F9D57',
              orange: '#F57C00',
              ink: '#0E1F16',
              fog: '#F5F3EE'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui'],
            display: ['Poppins', 'Inter']
          },
          boxShadow: {
            soft: '0 6px 24px rgba(0,0,0,.06)'
          },
          borderRadius: { xl2: '1.25rem' }
        }
      }
    }
  </script>

  <style>
    :root {
      --fp-green: #1D6B3A;
      --fp-green2: #2F9D57;
      --fp-orange: #F57C00;
      --fp-ink: #0E1F16;
      --fp-fog: #F5F3EE;
      --shadow: 0 6px 24px rgba(0, 0, 0, .06);
      --radius: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.25rem;
      border-radius: var(--radius);
      background: var(--fp-green);
      color: #fff;
      font-weight: 600;
      transition: .2s ease;
      text-decoration: none;
    }

    .btn:hover {
      opacity: .95;
    }

    .btn:active {
      opacity: .9;
    }

    .btn-outline {
      background: #fff;
      color: var(--fp-green);
      border: 1px solid var(--fp-green);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .35rem .7rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(29, 107, 58, .10);
      color: var(--fp-green);
    }

    .container-edge {
      max-width: 72rem;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: .2s ease;
      display: flex;
      flex-direction: column;
    }

    .card img {
      display: block;
      height: auto;
    }
  </style>
</head>

<body class="bg-fp-fog text-fp-ink font-sans" data-page="menu">
  <header class="bg-white/80 backdrop-blur sticky top-0 z-50 border-b border-black/5">
    <div class="container-edge flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-3">
        <img src="/assets/logo.png" alt="FitPoint Fitness" class="h-10 w-30  rounded-full" />
        <span class="font-display text-xl font-bold tracking-tight">FitPoint <span
            class="text-fp-green">Fitness</span></span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm">
        <a href="/cardapio.html" class="hover:text-fp-green flex items-center gap-1">
          Cardápio
        </a>
        <a href="/receitas.html" class="hover:text-fp-green flex items-center gap-1">
          Receitas
        </a>
        <a href="/sobre.html" class="hover:text-fp-green flex items-center gap-1">
          Sobre
        </a>
        <a href="/contato.html" class="hover:text-fp-green flex items-center gap-1">
          Contato
        </a>
        <a href="/cardapio.html" class="btn"><i data-lucide="shopping-bag"></i> Ver Cardápio</a>
      </nav>

      <a href="/cardapio.html" class="md:hidden btn">Cardápio</a>
    </div>
  </header>


  <main class="max-w-6xl mx-auto px-4 py-10">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <h1 class="font-display text-3xl font-bold">Cardápio</h1>
        <p class="text-black/70">Filtre por categoria ou busque pelo nome.</p>
      </div>
      <div class="flex gap-2">
        <select id="filter-category" class="border rounded-xl px-3 py-2 bg-white">
          <option value="">Todas categorias</option>
        </select>
        <input id="search" type="search" placeholder="Buscar..." class="border rounded-xl px-3 py-2 bg-white w-56" />
      </div>
    </div>

    <div id="menu-grid" class="mt-8 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">Carregando…</div>
  </main>

  <footer class="bg-white border-t border-black/5">
    <div class="max-w-6xl mx-auto px-4 py-8 text-sm">© <span id="y"></span> FitPoint</div>
  </footer>

  <script src="/js/app.js"></script>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>

</html>
