<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contato — FitPoint Fitness</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fp: {
              green: '#1D6B3A',
              green2: '#2F9D57',
              orange: '#F57C00',
              ink: '#0E1F16',
              fog: '#F5F3EE'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui'],
            display: ['Poppins', 'Inter']
          },
          boxShadow: {
            soft: '0 6px 24px rgba(0,0,0,.06)'
          },
          borderRadius: { xl2: '1.25rem' }
        }
      }
    }
  </script>
  <style>
    :root {
      --fp-green: #1D6B3A;
      --fp-green2: #2F9D57;
      --fp-orange: #F57C00;
      --fp-ink: #0E1F16;
      --fp-fog: #F5F3EE;
      --shadow: 0 6px 24px rgba(0, 0, 0, .06);
      --radius: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.25rem;
      border-radius: var(--radius);
      background: var(--fp-green);
      color: #fff;
      font-weight: 600;
      transition: .2s ease;
      text-decoration: none;
    }

    .btn:hover {
      opacity: .95;
    }

    .btn:active {
      opacity: .9;
    }

    .btn-outline {
      background: #fff;
      color: var(--fp-green);
      border: 1px solid var(--fp-green);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .35rem .7rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(29, 107, 58, .10);
      color: var(--fp-green);
    }

    .container-edge {
      max-width: 72rem;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: .2s ease;
      display: flex;
      flex-direction: column;
    }

    .card img {
      display: block;
      height: auto;
    }
  </style>
</head>

        <img src="/assets/logo.png" alt="FitPoint Fitness" class="h-10 w-30  rounded-full" />

            class="text-fp-green">Fitness</span></span>

        <a href="/receitas.html" class="hover:text-fp-green flex items-center gap-1" data-nav="recipes">

        <a href="/sobre.html" class="hover:text-fp-green flex items-center gap-1" data-nav="about">

      </nav>
      <div class="flex items-center gap-2 md:hidden">
        <button id="mobile-menu-toggle" type="button"
          class="inline-flex items-center justify-center h-11 w-11 rounded-full border border-black/10 bg-white text-fp-ink shadow-soft"
          aria-label="Abrir menu" aria-controls="mobile-menu" aria-expanded="false">
          <i data-lucide="menu"></i>
        </button>
      </div>
    </div>
  </header>
  <div id="mobile-menu" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-200" data-menu-overlay

    <nav
      class="absolute top-0 right-0 h-full w-72 max-w-[80vw] bg-white shadow-soft p-6 flex flex-col gap-6 translate-x-full transition-transform duration-200"
      data-menu-panel aria-label="Menu mobile">
      <div class="flex items-center justify-between">
        <span class="font-display text-xl font-bold text-fp-ink">Menu</span>
        <button type="button"
          class="inline-flex items-center justify-center h-9 w-9 rounded-full border border-black/10 bg-white text-fp-ink"
          data-menu-close aria-label="Fechar menu">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="flex flex-col gap-4 text-base text-fp-ink">
        <a href="/" class="flex items-center gap-2" data-menu-close data-nav="home">
          Início
        </a>
        <a href="/cardapio.html" class="flex items-center gap-2" data-menu-close data-nav="menu">
          Cardápio
        </a>
        <a href="/receitas.html" class="flex items-center gap-2" data-menu-close data-nav="recipes">
          Receitas
        </a>
        <a href="/sobre.html" class="flex items-center gap-2" data-menu-close data-nav="about">
          Sobre
        </a>
        <a href="/contato.html" class="flex items-center gap-2" data-menu-close data-nav="contact">
          Contato
        </a>
      </div>
    </nav>
  </div>
